<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Calculator</title>
</head>

<body>

    <div
        style="width: fit-content; margin: auto; padding: 0.5rem; border: 1px solid black; border-radius: 0.5rem; background-color: lightgray;">

        <div
            style="display:flex; width: 98%; height: 5rem; background-color: azure; margin: auto; align-items: center; text-align: end; font-family: monospace; font-size: 3rem; border-radius: 0.5rem; border: 1px solid black;">
            <span id="result" style="margin-left:auto">00.0</span>
        </div>

        <div style="display: flex; flex-direction: columns; margin-top: 1rem;">
            <div
                style="display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-flow: row; gap: 0.5rem; width: 100%;">
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">Clr</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">(</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">)</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">/</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">7</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">8</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">9</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">*</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">4</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">5</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">6</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">-</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">1</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">2</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">3</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">+</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">/</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">0</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">.</span>
                <span
                    style="width: 1rem; height: 1rem; padding: 1rem; border-radius: 99999px; background-color: black; color:white; flex-basis: 25%; text-align: center;">=</span>

            </div>

        </div>


    </div>
</body>

</html>
